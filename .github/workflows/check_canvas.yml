name: Canvas State Tracker

on:
  schedule:
    - cron: '*/5 * * * *' # Every 5 minutes
  workflow_dispatch: # Allows manual trigger
    inputs:
      chat_id:
        description: 'ID чата для авто-отчета'
        required: false

jobs:
  run-tracker:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        cache: 'pip'
        
    - name: Install dependencies
      run: pip install -r requirements.txt
      
    - name: Run Canvas Scanner
      env:
        CANVAS_API_URL: ${{ secrets.CANVAS_API_URL }}
        CANVAS_API_KEY: ${{ secrets.CANVAS_API_KEY }}
        SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
        SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        TELEGRAM_CHAT_ID: ${{ github.event.inputs.chat_id || secrets.TELEGRAM_CHAT_ID }}
        IS_AUTO_REPORT: ${{ github.event.inputs.chat_id != '' && 'true' || 'false' }}
        PYTHONPATH: ${{ github.workspace }}
      run: python src/main.py
